name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (required when manually triggering from a branch)"
        required: false
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog (English)
        uses: orhun/git-cliff-action@v4
        id: git_cliff_en
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create or Update Draft Release
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          RELEASE_BODY: ${{ steps.git_cliff_en.outputs.content || 'See the assets to download this version and install.' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = process.env.RELEASE_BODY;
            const releaseName = `DbPaw ${tag}`;
            const manualTag = context.payload?.inputs?.tag;

            if (context.eventName === "workflow_dispatch" && !manualTag) {
              throw new Error("workflow_dispatch requires input 'tag' (e.g. v0.1.5).")
            }

            if (!tag) {
              throw new Error("Tag is empty. For workflow_dispatch, provide the 'tag' input.")
            }

            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            }

  build:
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libkrb5-dev \
            unixodbc-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg unixodbc

      - name: Setup Rosetta 2 and x86_64 Homebrew
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail

          softwareupdate --install-rosetta --agree-to-license || true

          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          fi

          arch -x86_64 /usr/local/bin/brew install unixodbc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build app (non-Windows)
        if: matrix.platform != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ runner.os }}" = "macOS" ]; then
            bun run tauri build --target ${{ matrix.target }} --bundles app
          else
            bun run tauri build --target ${{ matrix.target }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPGRADE_LINK_ACCESS_KEY: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          RUSTFLAGS: ${{ matrix.target == 'x86_64-apple-darwin' && '-L /usr/local/lib' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.target == 'x86_64-apple-darwin' && '/usr/local/lib/pkgconfig' || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.target == 'x86_64-apple-darwin' && '1' || '' }}

      - name: Build app (Windows)
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPGRADE_LINK_ACCESS_KEY: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          CXXFLAGS: "/EHsc /std:c++17"
        run: |
          $ErrorActionPreference = 'Continue'
          for ($i = 1; $i -le 3; $i++) {
            bun run tauri build --target ${{ matrix.target }}
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($i -lt 3) {
              Write-Host "Build failed (attempt $i/3). Retrying in 10 seconds..."
              Start-Sleep -Seconds 10
            }
          }
          exit $LASTEXITCODE

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir=""
          if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle" ]; then
            bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          elif [ -d "src-tauri/target/release/bundle" ]; then
            bundle_dir="src-tauri/target/release/bundle"
          fi

          if [ -z "$bundle_dir" ]; then
            echo "No bundle directory found for target ${{ matrix.target }}"
            find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
            exit 1
          fi

          echo "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Bundle x86_64 macOS dylibs
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          bundle_dir="${{ steps.paths.outputs.bundle_dir }}"
          app_path="$(find "$bundle_dir/macos" -maxdepth 1 -type d -name '*.app' | head -n 1 || true)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in $bundle_dir/macos"
            find "$bundle_dir" -maxdepth 4 -print || true
            exit 1
          fi

          executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          executable="$app_path/Contents/MacOS/$executable_name"
          if [ ! -x "$executable" ]; then
            echo "Executable not found or not executable: $executable"
            find "$app_path/Contents/MacOS" -maxdepth 1 -type f -print || true
            exit 1
          fi

          frameworks_dir="$app_path/Contents/Frameworks"
          mkdir -p "$frameworks_dir"

          should_bundle_dep() {
            local dep="$1"
            [[ "$dep" != /usr/lib/* ]] \
              && [[ "$dep" != /System/* ]] \
              && [[ "$dep" != @* ]] \
              && [ -f "$dep" ]
          }

          collect_deps() {
            local target="$1"
            local deps dep dep_name

            deps="$(otool -L "$target" 2>/dev/null | tail -n +2 | awk '{print $1}')"
            for dep in $deps; do
              if ! should_bundle_dep "$dep"; then
                continue
              fi

              dep_name="$(basename "$dep")"
              if [ ! -f "$frameworks_dir/$dep_name" ]; then
                echo "Bundling dependency: $dep"
                cp -L "$dep" "$frameworks_dir/$dep_name"
                chmod u+w "$frameworks_dir/$dep_name"
                collect_deps "$dep"
              fi
            done
          }

          rewrite_target_deps() {
            local target="$1"
            local deps dep dep_name

            deps="$(otool -L "$target" 2>/dev/null | tail -n +2 | awk '{print $1}')"
            for dep in $deps; do
              if ! should_bundle_dep "$dep"; then
                continue
              fi

              dep_name="$(basename "$dep")"
              if [ -f "$frameworks_dir/$dep_name" ]; then
                install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" "$target"
              fi
            done
          }

          echo "Executable before bundling:"
          otool -L "$executable"

          collect_deps "$executable"

          for dylib in "$frameworks_dir"/*.dylib; do
            [ -f "$dylib" ] || continue
            dylib_name="$(basename "$dylib")"
            install_name_tool -id "@executable_path/../Frameworks/$dylib_name" "$dylib"
            rewrite_target_deps "$dylib"
          done
          rewrite_target_deps "$executable"

          echo ""
          echo "Bundled dylibs:"
          find "$frameworks_dir" -maxdepth 1 -type f -name '*.dylib' -print -exec otool -L {} \;

          echo ""
          echo "Executable after bundling:"
          otool -L "$executable"

          if otool -L "$executable" | grep -q '/usr/local/opt/unixodbc'; then
            echo "Executable still references /usr/local/opt/unixodbc"
            exit 1
          fi

          codesign --force --deep --sign - "$app_path"
          codesign --verify --deep --strict "$app_path"

          macos_dir="$bundle_dir/macos"
          updater_bundle="$macos_dir/DbPaw-${{ matrix.target }}.app.tar.gz"
          rm -f "$macos_dir"/*.app.tar.gz "$macos_dir"/*.app.tar.gz.sig
          tar -czf "$updater_bundle" -C "$macos_dir" "$(basename "$app_path")"

          if [ -z "${TAURI_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required to regenerate the modified updater bundle signature."
            exit 1
          fi

          if [ -n "${TAURI_PRIVATE_KEY_PASSWORD:-}" ]; then
            ./node_modules/.bin/tauri signer sign --private-key "$TAURI_PRIVATE_KEY" --password "$TAURI_PRIVATE_KEY_PASSWORD" "$updater_bundle" > "$updater_bundle.sig"
          else
            ./node_modules/.bin/tauri signer sign --private-key "$TAURI_PRIVATE_KEY" "$updater_bundle" > "$updater_bundle.sig"
          fi

          if [ ! -s "$updater_bundle.sig" ]; then
            echo "Updater signature was not generated: $updater_bundle.sig"
            exit 1
          fi

          echo "Regenerated updater bundle: $updater_bundle"
          echo "Regenerated updater signature: $updater_bundle.sig"

      - name: Normalize macOS updater bundle names
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="${{ steps.paths.outputs.bundle_dir }}"
          src="$(find "$bundle_dir/macos" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1 || true)"
          if [ -z "$src" ]; then
            exit 0
          fi

          dst="$bundle_dir/macos/DbPaw-${{ matrix.target }}.app.tar.gz"
          if [ "$src" != "$dst" ] && [ ! -f "$dst" ]; then
            mv "$src" "$dst"
          fi

          if [ -f "${src}.sig" ] && [ ! -f "${dst}.sig" ]; then
            mv "${src}.sig" "${dst}.sig"
          fi

      - name: Create x86_64 macOS DMG
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          bundle_dir="${{ steps.paths.outputs.bundle_dir }}"
          app_path="$(find "$bundle_dir/macos" -maxdepth 1 -type d -name '*.app' | head -n 1 || true)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in $bundle_dir/macos"
            exit 1
          fi

          dmg_dir="$bundle_dir/dmg"
          dmg_path="$dmg_dir/DbPaw_${TAG_NAME}_x86_64.dmg"
          mkdir -p "$dmg_dir"
          rm -f "$dmg_path"

          create-dmg \
            --volname "DbPaw" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "$(basename "$app_path")" 200 190 \
            --hide-extension "$(basename "$app_path")" \
            --app-drop-link 600 185 \
            "$dmg_path" \
            "$app_path"

          echo "Created DMG: $dmg_path"

      - name: Generate updater metadata
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          BUNDLE_DIR: ${{ steps.paths.outputs.bundle_dir }}
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import json
          import os
          import pathlib
          import sys

          bundle_dir = pathlib.Path(os.environ["BUNDLE_DIR"])
          target = os.environ["TARGET_TRIPLE"]
          tag = os.environ["TAG_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          def pick(patterns: list[str]) -> pathlib.Path | None:
            for pattern in patterns:
              matches = sorted(bundle_dir.glob(pattern))
              if matches:
                return matches[0]
            return None

          if target in ("aarch64-apple-darwin", "x86_64-apple-darwin"):
            platform = "darwin-aarch64" if target.startswith("aarch64") else "darwin-x86_64"
            bundle = pick(["macos/*.app.tar.gz"])
          elif target == "x86_64-unknown-linux-gnu":
            platform = "linux-x86_64"
            bundle = pick(["appimage/*.AppImage"])
          elif target == "x86_64-pc-windows-msvc":
            platform = "windows-x86_64"
            bundle = pick(["nsis/*.exe", "msi/*.msi"])
          else:
            raise SystemExit(f"Unsupported target triple: {target}")

          if bundle is None:
            print(f"No updater bundle found for target {target}", file=sys.stderr)
            print(f"Searched in: {bundle_dir}", file=sys.stderr)
            for p in sorted(bundle_dir.rglob("*")):
              if p.is_file():
                print(p.relative_to(bundle_dir), file=sys.stderr)
            raise SystemExit(1)

          sig_path = pathlib.Path(str(bundle) + ".sig")
          if not sig_path.exists():
            print(f"Signature file not found: {sig_path}", file=sys.stderr)
            raise SystemExit(1)

          signature = sig_path.read_text(encoding="utf-8").strip()
          pub_date = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          url = f"{base_url}/{bundle.name}"

          data = {
            "version": tag,
            "notes": "See the assets to download this version and install.",
            "pub_date": pub_date,
            "platforms": {platform: {"url": url, "signature": signature}},
          }

          out_dir = pathlib.Path("updater-json")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / f"latest-{target}.json"
          out_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"Wrote {out_path}")
          PY

      - name: Upload bundle artifacts (macOS)
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            ${{ steps.paths.outputs.bundle_dir }}/macos/**/*.app.tar.gz*
            ${{ steps.paths.outputs.bundle_dir }}/dmg/**/*.dmg
          if-no-files-found: error

      - name: Upload bundle artifacts (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            ${{ steps.paths.outputs.bundle_dir }}/appimage/**/*.AppImage*
            ${{ steps.paths.outputs.bundle_dir }}/deb/**/*.deb
            ${{ steps.paths.outputs.bundle_dir }}/rpm/**/*.rpm
          if-no-files-found: error

      - name: Upload bundle artifacts (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            ${{ steps.paths.outputs.bundle_dir }}/msi/**/*.msi*
            ${{ steps.paths.outputs.bundle_dir }}/nsis/**/*.exe*
          if-no-files-found: error

      - name: Upload updater metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.target }}
          path: updater-json/latest-${{ matrix.target }}.json
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: Download updater metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          path: updater-json

      - name: Merge latest.json platforms
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find updater-json -type f -name '*.json')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No updater json files found in artifacts."
            exit 1
          fi

          mkdir -p merged
          jq -s '
            reduce .[] as $item (
              {version: null, notes: null, pub_date: null, platforms: {}};
              .version = (.version // $item.version) |
              .notes = (.notes // $item.notes) |
              .pub_date = (.pub_date // $item.pub_date) |
              .platforms += ($item.platforms // {})
            )
          ' "${files[@]}" > merged/latest.json

          echo "Merged platform keys:"
          jq '.platforms | keys' merged/latest.json

      - name: Remove per-platform latest json assets
        shell: bash
        run: find artifacts -type f -name 'latest*.json' -delete

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/**/*
            merged/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
